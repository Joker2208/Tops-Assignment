<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        
        .flexbox{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 50px;
        }



        .box1{
            height: 400px;
            display: flex;
            flex-direction: column;
            flex: 1 1 300px;
            background-color: #57DDB7;
            border-radius: 10px;
            border-bottom: 5px solid green;   
        }

        .box1:hover{
            box-shadow: 0px 0px 0px 1px green;
        }

        .text1{
            margin-top: auto;
            margin-bottom: 40px;
        }

        .box2{
            height: 400px;
            flex: 1 1 300px;
            background-color: #73B9FB;
            border-radius: 10px;
            border-bottom: 5px solid #118bfc;
        }

        .box2:hover{
            box-shadow: 0px 0px 0px 1px #1589f5;
        }

        .box3{
            height: 400px;
            flex: 1 1 300px;
            background-color: #f5bb49;
            border-radius: 10px;
            border-bottom: 5px solid #f4a70e;
        }

        .box3:hover{
            box-shadow: 0px 0px 0px 1px #faa803;
        }

        .box4{
            height: 150px;
            flex: 1 1 300px;
            background-color: #D98AE8;
            border-radius: 10px;
            border-bottom: 5px solid rgb(245, 4, 245);
        }

        .box4:hover{
            box-shadow: 0px 0px 0px 1px rgb(244, 5, 244);
        }

        .box5{
            height: 150px;
            flex: 1 1 300px;
            background-color: #A98AF5;
            border-radius: 10px;
            border-bottom: 5px solid #9975f7;
        }

        .box5:hover{
            box-shadow: 0px 0px 0px 1px #9975f7;
        }

    </style>
</head>
<body>
    <div class="flexbox">
    <div class="box1"> I am at top
         <div class="text1">FA Chisel
            <p>Structural and unique icons that you won't want to sleep on (because they are sharp)</p>
        </div>
    </div>
    <div class="box2">Box</div>
    <div class="box3">Box3</div>
    <div class="box4">Box4</div>
    <div class="box5">Box5</div>
    </div>
    
</body>
</html>
