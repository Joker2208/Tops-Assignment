<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1>Nested Unordered List</h1>
    <ul>
        <li>Fruits</li>
            <ul type="circle">
                <li>Apple</li>
                    <ul type="square">
                        <li>Granny Smith</li>
                        <li>Gala</li>
                        <li>Fuji</li>
                    </ul>
                
                    <li>Orange</li>
                        <ul>
                            <li>Navel</li>
                            <li>Blood Orange</li>
                            <li>Mandarin</li>
                        </ul>
                </ul>
            </ul>
        
    </ul>
</body>
</html>
