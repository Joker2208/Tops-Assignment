<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart </title>
</head>
<body>
    <h1 align="center">Review Form</h1>
    <fieldset align="center" width="100">
        <form action="" method="post">
        <b><label for="user_name">Username</label></b>
        <input type="text" id="user_name" name="username"> <br><br>

        <b><label for="rating">Review</label></b>
        <select name="Ratings" id="rating" required>
        <option value=""></option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        </select> <br><br>

        <b><label for="">Message</label></b>
        <textarea name="Message" id="Message" minlength="20" required></textarea> <br>

        <input type="submit" width="20px" height="20px">

    </form>
    </fieldset>
    
    
</body>
</html>
