<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato</title>
    <style>
        .box{
            border: 2px solid black;
            border-radius: 10px 10px 10px 10px;
            height: 150px;
            width: 200px;
            margin: auto;
            margin-top: 30px;
            padding: 20px;
            text-align: center;
            font-family: cursive;
            font-size: larger;
            font-weight: 100;

        }

        .food{
            border-bottom: 2px dotted black;
        }

        body{
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
            background:linear-gradient(rgb(248, 50, 50), white) ;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <h1>Zomato</h1>
    <div class="box">
        <p class="food">Cucina Marinara</p>
        <p class="food">Italian</p>
        <p class="food">4.5 ★</p>
    </div>
</body>
</html>
