<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
     <link rel="stylesheet" href="style.css">


    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #img1{
            height: 300px;
            width: 200px;
        }
    

        .box{
            height: 500px;
            width: 300px;
            margin: auto;
            margin-top: 50px;
            padding: 50px;
            border: 2px solid black;
            border-radius: 50px 50px 50px 50px;
            text-align: center;
            background: linear-gradient(white, yellow ) ;
        }
    </style>
</head>
<body>
    
    <div class="box">
        <img src="" alt="" id="img1">
        <p style="font-size: 20px;">Headphones</p><br>
        <p>These are Noise Clearing headphones with great base and clear audio.</p>
    </div><br>

    <button id="Buy">Buy</button>

</body>
</html>
