<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: linear-gradient(to bottom, green, black);
            min-height: 100vh;
            text-align: center;
            font-size: x-large;
        }

        .box{
            height: 150px;
            width: 450px;
            margin: auto;
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            border: 2px solid black;
            border-radius: 10px 10px 10px 10px;
        }

        .playlist_item{
            color: white;
        }

        #song{
            color: black;
            background-color: antiquewhite;
        }

    </style>
</head>
<body>
  <h1 style="text-decoration-color: black;">Welcome to Spotify</h1>
   <div class="box">
    <p class="playlist_item" id="song">Blinding Lights</p>
    <p class="playlist_item">Gods Plan</p>
    <p class="playlist_item">Still Drake</p>
   </div>
</body>
</html>
