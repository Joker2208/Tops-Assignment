<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Bar</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .playlist{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            align-items: center;
            min-height: 100vh;
        }

        .card{
            height: 200px;
            width: 200px;
            border: 2px solid black;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }


    </style>
</head>
<body>
    <div class="playlist">
        <div class="card">
        <p>National Treasure</p>
        <p>Drake</p>
    </div>
    <div class="card">
        <p>God's Plan</p>
        <p>Drake</p>
    </div>
    <div class="card">
        <p>First Person Shooter</p>
        <p>J Cole</p>
    </div>
    <div class="card">
        <p>Love Story</p>
        <p>Indala</p>
    </div>
    <div class="card">
        <p>Rap God</p>
        <p>Eminem</p>
    </div>
    </div>
    
</body>
</html>
