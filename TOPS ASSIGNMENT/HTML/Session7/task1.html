<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task1</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            align-items: center;
            min-height: 100vh;
        }

        img{
            height: 200px;
            width: 200px;
            border-radius: 20px;
        }

        .wrapper{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        p{
            font-weight: bold;
            font-size: large;
        }
    </style>
</head>
<body>
    <div class="container" id="div1">
    <div class="wrapper" id="div2">
         <img src="insta.jpg" alt="">
         <p>Instagram</p>
    </div>
       
    <div class="wrapper" id="div3">
         <img src="Whatsapp.jpg" alt="">
         <p>Whatsapp</p>
    </div>
        
    <div class="wrapper" id="div4">
         <img src="zomato.png" alt="">
         <p>Zomato</p>
    </div>
    
    <div class="wrapper" id="div5">
         <img src="spotify-1759471_1280.jpg" alt="">
         <p>Spotify</p>
    </div>
       
    </div>

</body>
</html>
